# Full stack in Docker — db + backend + frontend, all on one network.
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml logs -f backend
#
# Requires a .env file in this directory (see .env.example) — FERNET_KEY,
# AILABS_BASE_URL, etc. DATABASE_URL is overridden below to point at the
# `db` service by its Docker DNS name, not localhost.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ed_user
      POSTGRES_PASSWORD: ed_password
      POSTGRES_DB: email_dashboard
    volumes:
      - ed_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ed_user -d email_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # Overrides whatever DATABASE_URL is in .env — must point at the `db`
      # service (Docker's internal DNS), not localhost/host-mapped port.
      DATABASE_URL: postgresql+psycopg://ed_user:ed_password@db:5432/email_dashboard
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ed_pgdata:
